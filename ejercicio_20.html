    <h1>Ejercicio 20</h1>
    <p>Cree un formulario que permita ingresar un número N y muestre la suma de todos los números del 1 hasta N.</p>
    <h2>Formulario - Suma acumulada</h2>
    <form action="Ejercicio_20.php" method="POST">
        <label for="num">Número (N):</label>
        <input type="number" id="num" name="num" min="1" required><br><br>
        <button type="submit">Calcular</button>
    </form>
</body>
