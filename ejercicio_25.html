<body>
    <h1>Ejercicio 25</h1>
    <p>Diseñe un formulario que solicite nombre, correo electrónico y ciudad del usuario, y muestre toda la información ingresada.</p>
    <h2>Formulario de datos del usuario</h2>
    <form action="Ejercicio_25.php" method="POST">
        <label for="nombre">Nombre:</label>
        <input type="text" id="nombre" name="nombre" required><br><br>
        <label for="correo">Correo electrónico:</label>
        <input type="email" id="correo" name="correo" required><br><br>
        <label for="ciudad">Ciudad:</label>
        <input type="text" id="ciudad" name="ciudad" required><br><br>
        <button type="submit">Enviar</button>
    </form>
</body>
