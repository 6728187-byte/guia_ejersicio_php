<body>
    <h1>Ejercicio 6</h1>
    <p>Elabore un formulario que solicite el nombre y la edad de una persona y muestre ambos datos.</p>
    <h2>Formulario de datos personales</h2>
    <form action="Ejercicio_6.php" method="POST">
        <label for="nombre">Nombre:</label>
        <input type="text" id="nombre" name="nombre" required><br><br>
        <label for="edad">Edad:</label>
        <input type="number" id="edad" name="edad" min="0" required><br><br>
        <button type="submit">Enviar</button>
    </form>
</body>
